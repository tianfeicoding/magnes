<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rednote 三节点连接演示</title>

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        .main-container {
            max-width: 1800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 36px;
            font-weight: bold;
            margin: 0 0 10px 0;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
            margin: 0;
        }

        .nodes-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .node-wrapper {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .node-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            border-radius: 16px 16px 0 0;
        }

        .node-wrapper.content::before {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        }

        .node-wrapper.stylelab::before {
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
        }

        .node-wrapper.preview::before {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
        }

        .node-title {
            font-size: 20px;
            font-weight: bold;
            margin: 0 0 15px 0;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .node-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        .data-flow-indicator {
            text-align: center;
            color: white;
            font-size: 24px;
            margin: 20px 0;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }
        }

        .debug-panel {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .debug-title {
            font-size: 18px;
            font-weight: bold;
            margin: 0 0 15px 0;
            color: #333;
        }

        .debug-content {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .connection-arrow {
            position: absolute;
            right: -30px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
            color: white;
            z-index: 10;
            animation: slideRight 1.5s ease-in-out infinite;
        }

        @keyframes slideRight {

            0%,
            100% {
                transform: translateY(-50%) translateX(0);
            }

            50% {
                transform: translateY(-50%) translateX(5px);
            }
        }

        @media (max-width: 1400px) {
            .nodes-container {
                grid-template-columns: 1fr;
            }

            .connection-arrow {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="main-container">
        <!-- Header -->
        <div class="header">
            <h1>🔗 Rednote 三节点连接演示</h1>
            <p>Content Node → StyleLab Node → Preview Node 完整数据流</p>
        </div>

        <!-- Nodes Container -->
        <div class="nodes-container">
            <!-- Content Node -->
            <div class="node-wrapper content" style="position: relative;">
                <div class="connection-arrow">→</div>
                <div class="node-title">
                    <span>✍️ Content Node</span>
                    <span class="node-badge">步骤 1</span>
                </div>
                <div id="content-node-container"></div>
            </div>

            <!-- StyleLab Node -->
            <div class="node-wrapper stylelab" style="position: relative;">
                <div class="connection-arrow">→</div>
                <div class="node-title">
                    <span>✨ StyleLab Node</span>
                    <span class="node-badge">步骤 2</span>
                </div>
                <div id="stylelab-node-container"></div>
            </div>

            <!-- Preview Node -->
            <div class="node-wrapper preview">
                <div class="node-title">
                    <span>📱 Preview Node</span>
                    <span class="node-badge">步骤 3</span>
                </div>
                <div id="preview-node-container"></div>
            </div>
        </div>

        <!-- Debug Panel -->
        <div class="debug-panel">
            <div class="debug-title">🔍 数据流调试面板</div>
            <div class="debug-content" id="debug-output">
                等待数据流...
            </div>
        </div>
    </div>

    <!-- Load Rednote Modules -->
    <script src="../templates.js"></script>
    <script src="../editable-utils.js"></script>
    <script src="../style-presets.js"></script>
    <script src="../content-node.js"></script>
    <script src="../stylelab-node.js"></script>
    <script src="../preview-node.js"></script>

    <!-- Main Application -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // 全局状态管理
        let globalState = {
            contentData: {
                text: {
                    title: '周末去哪儿',
                    subtitle: '上海探店指南',
                    date: '12.25',
                    price: '¥0'
                },
                images: []
            },
            styleLabData: {
                template: 'ticket',
                style: {
                    name: '复古票根',
                    palette: {
                        primary: '#D4AF37',
                        secondary: '#8B4513',
                        background: '#FFF8DC',
                        accent: '#CD853F'
                    }
                }
            },
            previewData: null,
            updateCallbacks: []
        };

        // 添加日志到调试面板
        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const debugEl = document.getElementById('debug-output');
            if (debugEl) {
                let color = '#333';
                if (type === 'content') color = '#667eea';
                if (type === 'stylelab') color = '#f5576c';
                if (type === 'preview') color = '#00f2fe';
                if (type === 'flow') color = '#4facfe';
                if (type === 'system') color = '#764ba2';

                const logDiv = document.createElement('div');
                logDiv.style.marginBottom = '5px';
                logDiv.style.color = color;
                logDiv.textContent = `[${timestamp}] ${type.toUpperCase()}: ${message}`;
                debugEl.appendChild(logDiv);
                debugEl.scrollTop = debugEl.scrollHeight;
            }
        }

        // Content Node Wrapper
        function ContentNodeWrapper() {
            const [data, setData] = useState(globalState.contentData);

            const handleUpdate = (newData) => {
                globalState.contentData = newData;
                setData(newData);
                addLog(`文本=${newData.text?.title || 'N/A'}, 图片=${newData.images?.length || 0}张`, 'content');
                // 触发其他节点更新
                globalState.updateCallbacks.forEach(cb => cb());
            };

            return React.createElement(window.RednoteContentNode, {
                node: { id: 'content-1', data: data },
                isSelected: false,
                updateNodeData: handleUpdate
            });
        }

        // StyleLab Node Wrapper
        function StyleLabNodeWrapper() {
            const [data, setData] = useState(globalState.styleLabData);
            const [contentData, setContentData] = useState(globalState.contentData);

            useEffect(() => {
                const callback = () => {
                    setContentData({ ...globalState.contentData });
                };
                globalState.updateCallbacks.push(callback);
                return () => {
                    globalState.updateCallbacks = globalState.updateCallbacks.filter(cb => cb !== callback);
                };
            }, []);

            const handleUpdate = (newData) => {
                globalState.styleLabData = newData;
                setData(newData);
                addLog(`模板=${newData.template}, 风格=${newData.style?.name || 'N/A'}`, 'stylelab');
                // 触发其他节点更新
                globalState.updateCallbacks.forEach(cb => cb());
            };

            return React.createElement(window.RednoteLayoutNodeV2, {
                node: { id: 'stylelab-1', data: data },
                isSelected: false,
                connectedImages: contentData.images || [],
                connectedText: contentData.text || {},
                updateNodeData: handleUpdate
            });
        }

        // Preview Node Wrapper
        function PreviewNodeWrapper() {
            const [layoutData, setLayoutData] = useState(null);

            useEffect(() => {
                const callback = () => {
                    const combined = {
                        ...globalState.contentData,
                        ...globalState.styleLabData,
                        timestamp: Date.now()
                    };
                    globalState.previewData = combined;
                    setLayoutData(combined);
                    addLog('数据已更新', 'flow');
                };
                globalState.updateCallbacks.push(callback);
                // 初始化
                callback();
                return () => {
                    globalState.updateCallbacks = globalState.updateCallbacks.filter(cb => cb !== callback);
                };
            }, []);

            return React.createElement(window.RednotePreviewNode, {
                node: { id: 'preview-1', data: layoutData },
                isSelected: false,
                connectedLayoutData: layoutData,
                updateNodeData: (data) => addLog('预览已更新', 'preview')
            });
        }

        // 等待所有模块加载完成
        setTimeout(() => {
            if (window.RednoteContentNode && window.RednoteLayoutNodeV2 && window.RednotePreviewNode) {
                // 渲染三个节点
                const contentRoot = ReactDOM.createRoot(document.getElementById('content-node-container'));
                contentRoot.render(React.createElement(ContentNodeWrapper));

                const stylelabRoot = ReactDOM.createRoot(document.getElementById('stylelab-node-container'));
                stylelabRoot.render(React.createElement(StyleLabNodeWrapper));

                const previewRoot = ReactDOM.createRoot(document.getElementById('preview-node-container'));
                previewRoot.render(React.createElement(PreviewNodeWrapper));

                addLog('三节点连接系统启动成功', 'system');
                addLog('Content Node → StyleLab Node → Preview Node', 'system');
                console.log('✅ 三节点连接系统启动成功');
            } else {
                console.error('❌ 节点模块加载失败');
                console.log('RednoteContentNode:', !!window.RednoteContentNode);
                console.log('RednoteLayoutNodeV2:', !!window.RednoteLayoutNodeV2);
                console.log('RednotePreviewNode:', !!window.RednotePreviewNode);
                addLog('节点模块加载失败，请检查控制台', 'system');
            }
        }, 500);
    </script>

    <script>
        // 全局日志拦截
        const originalLog = console.log;
        console.log = function (...args) {
            originalLog.apply(console, args);
            const debugEl = document.getElementById('debug-output');
            if (debugEl && args[0] && typeof args[0] === 'string') {
                const timestamp = new Date().toLocaleTimeString();
                const message = args.join(' ');
                const logDiv = document.createElement('div');
                logDiv.style.marginBottom = '5px';
                logDiv.style.color = message.includes('✅') ? '#10b981' : '#333';
                logDiv.textContent = `[${timestamp}] ${message}`;
                debugEl.appendChild(logDiv);
                debugEl.scrollTop = debugEl.scrollHeight;
            }
        };
    </script>
</body>

</html>
