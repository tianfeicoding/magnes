<!DOCTYPE html>
<html lang="zh-CN" class="bg-white h-full">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magnes - Next Gen Creative Studio</title>

    <!-- UI Core -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    
    <!-- Configs & Styles -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/styles-monochrome.css" />
    <link rel="stylesheet" href="js/libs/reactflow.min.css" />
    
    <!-- 100% 平面与白色背景  -->
    <style>
        html, body, #root {
            width: 100% !important;
            height: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
            background-color: #ffffff !important;
        }
    </style>
    <script src="core/tailwind.config.js"></script>
    
    <!-- React Flow Styles -->
    <!-- 使用本地样式以保证一致性 -->

    <style>
        /* Loading Screen Style (Keep inline for immediate display) */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .artistic-loader {
            width: 40px;
            height: 40px;
            border: 4px solid #000;
            animation: rotate 2s infinite linear;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>

<body>
    <div id="loading-screen">
        <div class="artistic-loader"></div>
    </div>
    <div id="root"></div>

    <!-- 1. External Core Dependencies (Local) -->
    <script src="js/libs/react.production.min.js"></script>
    <script src="js/libs/react-dom.production.min.js"></script>
    <script src="js/libs/babel.min.js"></script>
    <script src="js/libs/lucide.min.js"></script>
    <script src="js/libs/reactflow.min.js"></script>

    <!-- 2. Dynamic Module Loader -->
    <script src="core/module-loader.js"></script>
</body>

</html>
