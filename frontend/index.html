<!DOCTYPE html>
<html lang="zh-CN" class="bg-white h-full">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magnes - Next Gen Creative Studio</title>

    <!-- UI Core -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet" />

    <!-- Configs & Styles -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/styles-monochrome.css" />
    <link rel="stylesheet" href="js/libs/reactflow.min.css" />

    <!-- 100% 平面与白色背景  -->
    <style>
        html,
        body,
        #root {
            width: 100% !important;
            height: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
            background-color: #ffffff !important;
        }
    </style>
    <script src="core/tailwind.config.js"></script>

    <!-- React Flow Styles -->
    <!-- 使用本地样式以保证一致性 -->

    <style>
        /* Loading Screen Style (Keep inline for immediate display) */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .magnes-text-loader {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 3.5rem;
            color: #000;
            letter-spacing: -0.05em;
            animation: magnes-pulse 1.8s infinite ease-in-out;
            user-select: none;
        }

        @keyframes magnes-pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.6;
            }

            50% {
                transform: scale(1.01);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div id="loading-screen">
        <div class="magnes-text-loader">Magnes</div>
    </div>
    <div id="root"></div>

    <!-- 1. External Core Dependencies (Local) -->
    <script src="js/libs/react.production.min.js"></script>
    <script src="js/libs/react-dom.production.min.js"></script>
    <script src="js/libs/babel.min.js"></script>
    <script src="js/libs/lucide.min.js"></script>
    <script src="js/libs/reactflow.min.js"></script>

    <!-- 2. Dynamic Module Loader -->
    <script src="core/module-loader.js?v=1.0.0_04280356"></script>
</body>

</html>
